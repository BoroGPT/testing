{% extends "base.html" %}

{% block title %}Add Class - CMS{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('index') }}" class="breadcrumb">&larr; Back to Classes</a>
        <h1>Add New Class</h1>
    </div>
</div>

<div class="form-container">
    <form method="post" class="form">
        <div class="form-group">
            <label for="class_id">Class ID *</label>
            <input type="text" id="class_id" name="class_id" required placeholder="e.g., CS101">
        </div>

        <div class="form-group">
            <label for="name">Class Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Introduction to Computer Science">
        </div>

        <div class="form-group">
            <label for="instructor">Instructor *</label>
            <input type="text" id="instructor" name="instructor" required placeholder="e.g., Dr. Jane Smith">
        </div>

        <div class="form-group">
            <label for="schedule">Schedule *</label>
            <input type="text" id="schedule" name="schedule" required placeholder="e.g., MWF 10:00-11:00">
        </div>

        <div class="form-group">
            <label for="room">Room *</label>
            <input type="text" id="room" name="room" required placeholder="e.g., Building A - Room 101">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Class</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
