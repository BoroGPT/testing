<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Class Management System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="{{ url_for('index') }}">Class Management System</a>
            </div>
            <div class="nav-menu">
                <a href="{{ url_for('index') }}" class="nav-link">Classes</a>
                <a href="{{ url_for('add_class') }}" class="nav-link">Add Class</a>
                <form action="{{ url_for('search') }}" method="get" class="search-form">
                    <input type="text" name="q" placeholder="Search..." class="search-input">
                    <button type="submit" class="btn btn-search">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alerts">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">
                                {{ message }}
                                <button class="alert-close" onclick="this.parentElement.style.display='none'">&times;</button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Class Management System &copy; 2025</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
