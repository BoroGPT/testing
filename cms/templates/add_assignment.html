{% extends "base.html" %}

{% block title %}Add Assignment to {{ cls.name }} - CMS{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('view_class', class_id=cls.id) }}" class="breadcrumb">&larr; Back to {{ cls.name }}</a>
        <h1>Add Assignment</h1>
        <p>{{ cls.name }} ({{ cls.id }})</p>
    </div>
</div>

<div class="form-container">
    <form method="post" class="form">
        <div class="form-group">
            <label for="assignment_id">Assignment ID *</label>
            <input type="text" id="assignment_id" name="assignment_id" required placeholder="e.g., A001">
        </div>

        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required placeholder="e.g., Python Basics">
        </div>

        <div class="form-group">
            <label for="due_date">Due Date *</label>
            <input type="date" id="due_date" name="due_date" required>
        </div>

        <div class="form-group">
            <label for="max_points">Maximum Points *</label>
            <input type="number" id="max_points" name="max_points" required min="1" placeholder="e.g., 100">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Assignment</button>
            <a href="{{ url_for('view_class', class_id=cls.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
