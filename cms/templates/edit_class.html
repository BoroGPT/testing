{% extends "base.html" %}

{% block title %}Edit {{ cls.name }} - CMS{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('view_class', class_id=cls.id) }}" class="breadcrumb">&larr; Back to Class</a>
        <h1>Edit Class</h1>
    </div>
</div>

<div class="form-container">
    <form method="post" class="form">
        <div class="form-group">
            <label for="class_id">Class ID</label>
            <input type="text" id="class_id" value="{{ cls.id }}" disabled>
            <small>Class ID cannot be changed</small>
        </div>

        <div class="form-group">
            <label for="name">Class Name *</label>
            <input type="text" id="name" name="name" value="{{ cls.name }}" required>
        </div>

        <div class="form-group">
            <label for="instructor">Instructor *</label>
            <input type="text" id="instructor" name="instructor" value="{{ cls.instructor }}" required>
        </div>

        <div class="form-group">
            <label for="schedule">Schedule *</label>
            <input type="text" id="schedule" name="schedule" value="{{ cls.schedule }}" required>
        </div>

        <div class="form-group">
            <label for="room">Room *</label>
            <input type="text" id="room" name="room" value="{{ cls.room }}" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Class</button>
            <a href="{{ url_for('view_class', class_id=cls.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
